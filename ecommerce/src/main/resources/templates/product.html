<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <link rel="stylesheet" th:href="@{CSS/product.css}">
</head>
<body>
    <div class="wrapper">
        <form action="productRegister" method="post" enctype="multipart/form-data">
        <p th:text="${pmsg}">
            <h1>Product</h1>
            <div class="input-box">
                <input type="text" placeholder="Product Name" name="productName" id="pname"> 
               <i class="fa-brands fa-product-hunt"></i>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Product Price" name="price" id="pprice">
                <i class="fa-solid fa-indian-rupee-sign"></i>
            </div>
            
            <div class="input-box">
                <input type="text" placeholder="Product Category" name="category" id="pcategory">
                <i class="fa-solid fa-icons"></i>
            </div>
 			<div class="input-box">
                <input type="text" placeholder="Product Discount" name="discount" id="pdiscount">
                <i class="fa-solid fa-icons"></i>
            </div>
            
            <div class="image-box">
                <input type="file" placeholder="Upload Image" name="productImage" id="image">
            </div>
            
            <div class="remember">
                <label><input type="checkbox">Remember me</label>
                <a href="#"> forgot password?</a>
            </div>

            <button type="submit" class="btn">Register</button>
            
            <div class="register"><a href="home">Home</a>
       
            </div>
        </form>
        
    </div>
</body>
</html>
