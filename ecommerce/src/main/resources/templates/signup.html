<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <link rel="stylesheet" th:href="@{CSS/signup.css}">
</head>
<body>

    <div class="wrapper">
        <form action="signUpUser" method="post">
        <p th:text="${msg}" style="color:green; margin-left:10px"></p>
            <h1>Sign up </h1>
            <div class="input-box">
                <input type="text" placeholder="Username" name="username" id="username">
                <i class="fa-solid fa-users"></i>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Email" name="email" id="email" onInput="handlerEmail()"> 
                <i class="fa-solid fa-at"></i>
                <p id="emailmsg"></p>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" name="password" id="password">
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" name="confirmPassword" id="confirmPassword" onInput="handlerPassword()">
                <i class="fa-solid fa-lock"></i>
                <p id="passmsg"></p>
            </div>
            <div class="input-box">
                <input type="Date" placeholder="DOB" name="dateOfBirth" id=dateOfBirth>
                <i class="fa-solid fa-cake-candles"></i>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Phone number" name="phoneNumber" id="mobile">
                <i class="fa-solid fa-mobile-screen-button"></i>
            </div>

            <div class="remember">
                <label><input type="checkbox">Remember me</label>
                <a href="#"> forgot password?</a>
            </div>

            <button type="submit" class="btn">Sign up</button>

            <div class="register">
                <p>Do you have account?
                <a href="login">Login</a>
                </p>
            </div>
        </form>
    </div>
    <script th:src="@{js/signup.js}"></script>
    
</body>
</html>
