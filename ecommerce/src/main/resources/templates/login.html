<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <link rel="stylesheet" th:href="@{CSS/login.css}">
     <link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<p th:text="${mobile}">
    <div class="wrapper">
        <form action="loginUser" method="post">
        <p th:text="${msgFailedLogin}" style="color:red"></p>
        <p th:text="${error}" style="color:red"></p>
        
            <h1>Login</h1>
          
            <div class="input-box">
                <input type="text" placeholder="Email" name="email" id="email"> 
                <i class="fa-solid fa-at"></i>
            </div>
            
            <div class="input-box">
                <input type="password" placeholder="Password" name="password" id="password">
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="remember">
                <label><input type="checkbox" >Remember me</label>
                <input type="button" class="border" data-bs-toggle="modal" data-bs-target="#myModal" value="forgot password?">
            </div>

			
		<!-- 	<div class="container mt-3">
		<button type="button" class="btn btn-primary" data-bs-toggle="modal"
			data-bs-target="#myModal">Add new address</button>
	</div> -->
			
			
            <button type="submit" class="btn">Login</button>
            

            <div class="register">
                <p>Don't have account?
                <a href="signup">Register</a>
                </p>
            </div>
           <div class="register">
                <p>Login By Mobile?
                <a href="loginbymobile">login by mobile</a>
                </p>
                </div>
        </form>
        
           <!-- POP up for foregt password -->
    
    	<div class="modal" id="myModal">
		<div class="modal-dialog modal-lg">
			<div class="modal-content">

				<!-- Modal Header -->
				<div class="modal-header">
				[[${msg}]]
					<h4 class="modal-title">Enter Email</h4>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
			

				<!-- Modal body -->
				<div class="modal-body">
					<form action="sendotp" method="post">
						<div class="address-row"><input type="text" placeholder="Enter your email" name='email'></input></div>
<!-- 						<div class="address-row"><input type="text" placeholder="Enter your password" name='password'></input></div>
 -->						<input type="submit" value="Send otp"></input>
					</form>
				</div>

				<!-- Modal footer -->
				<div class="modal-footer">
					<button type="button" class="btn btn-danger"
						data-bs-dismiss="modal">Close</button>
				</div>

			</div>
		</div>
	</div>
    </div>
</body>
</html>
