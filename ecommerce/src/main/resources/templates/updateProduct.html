<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <link rel="stylesheet" th:href="@{CSS/product.css}">
</head>
<body>
<!-- <form action="registerUpdatedProduct" method="post">
[[${product}]]
            <button type="submit" class="btn">Register</button>
</form> -->

     <div class="wrapper">
        <form action="registerUpdatedProduct" method="post">
        <p th:text="${pmsg}">
            <h1>Update Product</h1>
               <input type="text" name="productId" id="pname" hidden  th:value="${product.productId}"> 
            <div class="input-box">
                <input type="text" name="productName" id="pname"   th:value="${product.productName}"> 
               <i class="fa-brands fa-product-hunt"></i>
            </div>
            <div class="input-box">
                <input type="text"  th:value="${product.price}" name="price" id="pprice">
                <i class="fa-solid fa-indian-rupee-sign"></i>
            </div>
            
            <div class="input-box">
                <input type="text" th:value="${product.category}" name="category" id="pcategory">
                <i class="fa-solid fa-icons"></i>
            </div>
 			<div class="input-box">
                <input type="text"  th:value="${product.discount}" name="discount" id="pdiscount">
                <i class="fa-solid fa-icons"></i>
            </div>

            <div class="remember">
                <label><input type="checkbox">Remember me</label>
                <a href="#"> forgot password?</a>
            </div>

            <button type="submit" class="btn">Update</button>
            
            <div class="register"><a href="home">Home</a>
            </div>
        </form>
    </div>   
</body>
</html>
