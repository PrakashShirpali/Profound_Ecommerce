<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      <link rel="stylesheet" th:href="@{CSS/home.css}">
</head>
<body>

 <!-- box 1 logo -->
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo"></div>
            </div>

            <!-- box 2= address -->

            <div class="nav-address border">
                <p>Deliver to</p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                   <div class="add-sec"> <p>India</p></div>
                </div>
            </div>

            <!-- Box 3 search-->

            <div class="nav-search">
                <input placeholder="search" class= "search-input">
                <div class="search-icon">
                    <i class="fa-brands fa-searchengin"></i>
                </div>
            </div>

            <!-- bOx 4 categories -->

            <div class="category">
                <li class="cat-1 border"> FASHION</li>
                <li class="cat-1 border" > GADGETS</li>
                <li class="cat-1 border"> FOOTWEAR</li>
            </div>

            <!-- Box 5 Signin -->

           <div class="signin border" th:unless="${user}">
               	<a href="login"><p>Hello, sign-in</p>
              <div class="signin-logo"><i class="fa-solid fa-right-to-bracket"></i>
              </div>
              </a>
			 </div>
            
            <div class="logout border" th:if="${user}">
                <div class="logout-page" ><a href="logout"><p>logout</p>
               	<div class="logout-logo"> <i class="fa-solid fa-right-to-bracket"></i></div>
                </div>
                </a>
            </div> 

            <!-- Box 6 cart -->

            <div class="cart border" >
              <a href="showCart"><p>Show cart</p></a>
              <div class="cart-logo"><i class="fa-solid fa-cart-shopping"></i>
              <sup>[[${totalQuantity}]]</sup>
              </div>
            </div>
            
             <!-- Box 7 add product -->
            <!-- <p th:text="${user.userType}"></p> -->
            <div class="add-product border" th:if="${user != null and user.userType == 'ADMIN'}">
            	
                <div class="product-border"><a href="product"><p>Add Product</p></div>
               <div class="product-logo"><i class="fa-brands fa-product-hunt"></i></div>
                </a>
            </div>
                     
        </div>

</body>
</html>
